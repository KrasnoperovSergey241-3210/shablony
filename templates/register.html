{% extends 'base.html' %}
{% block content %}
<style>
    h1 {
        margin-bottom: 30px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
    }
    .form-control {
        width: 100%;
        max-width: 400px;
        padding: 12px 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
        margin-bottom: 10px;
    }
    .btn-submit {
        padding: 12px 25px;
        font-size: 1.1em;
        background: #d32f2f;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
        font-weight: 600;
    }
    .btn-submit:hover {
        background: #b71c1c;
    }
</style>

<h1>Регистрация</h1>
<form method="POST">
    {% csrf_token %}
    <div class="form-group">
        <label><strong>Имя:</strong></label>
        <input type="text" name="name" required class="form-control">
    </div>
    <div class="form-group">
        <label><strong>Email:</strong></label>
        <input type="email" name="email" required class="form-control">
    </div>
    <div class="form-group">
        <label><strong>Пароль:</strong></label>
        <input type="password" name="password" required class="form-control">
    </div>
    <button type="submit" class="btn-submit">Зарегистрироваться</button>
</form>
{% endblock %}
